<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- 🌧️ Rain background -->
<div class="rain">
    
</div>

<!-- 🌊 FORM CONTAINER -->
<div class="form-wrapper">

    <h1 class="main-title">🌊 Flood Prediction System</h1>

    <form action="/predict" method="POST" class="glass-form">

        <label>Temperature (°C)</label>
        <input type="number" name="temp" placeholder="15 - 45 (e.g. 28)" required>

        <label>Humidity (%)</label>
        <input type="number" name="humidity" placeholder="30 - 100 (e.g. 70)" required>

        <label>Cloud Cover (%)</label>
        <input type="number" name="cloud" placeholder="0 - 100 (e.g. 60)" required>

        <label>Annual Rainfall (mm)</label>
        <input type="number" name="annual" placeholder="500 - 3000" required>

        <label>Jan-Feb Rainfall</label>
        <input type="number" name="janfeb" placeholder="0 - 500" required>

        <label>Mar-May Rainfall</label>
        <input type="number" name="marmay" placeholder="0 - 800" required>

        <label>Jun-Sep Rainfall</label>
        <input type="number" name="junsep" placeholder="100 - 1500" required>

        <label>Oct-Dec Rainfall</label>
        <input type="number" name="octdec" placeholder="0 - 800" required>

        <label>Average June Rainfall</label>
        <input type="number" name="avgjune" placeholder="0 - 500" required>

        <label>Flood Risk Index</label>
        <input type="number" step="0.01" name="sub" placeholder="0 - 1" required>

        <button type="submit">🌧 Predict Flood Risk</button>

    </form>

</div>
<script src="{{ url_for('static', filename='rain.js') }}"></script>
</body>
</html>
