<!DOCTYPE html>
<html>
<head>
    <title>Flood Alert</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- 🌧️ Rain effect (required for animation) -->
<div class="rain">
    </div>

<!-- 🌊 RESULT CARD -->
<div class="result-wrapper">

    <div class="result-card danger">

        <div class="icon">⚠️</div>

        <h1>FLOOD ALERT</h1>

        <p class="desc">
            High chance of flood detected based on current weather conditions.
        </p>

        <div class="risk-box">
            <h2>Flood Risk</h2>
            <span>{{ risk }}%</span>
        </div>

        <a href="/predict">🔁 Try Again</a>

    </div>

</div>
<script src="{{ url_for('static', filename='rain.js') }}"></script>
</body>
</html>
